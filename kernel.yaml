architecture: arm64

# ── Sultan kernel for Pixel 8 Pro (husky / zuma / ripcurrent) ────────────────
#
# Sultan's kernel ships as a prebuilt .deb that installs:
#   /boot/vmlinuz-<ver>
#   /boot/initrd.img-<ver>         (generated by initramfs-tools)
#   /usr/lib/linux-image-<ver>/google/husky.dtb
#   /lib/modules/<ver>/
#
# Releases: https://github.com/sultanxda/sultan-kernel-releases
# The deb is fetched at build time so the recipe always picks up the
# latest tagged release.  Pin a specific SULTAN_TAG value to freeze.
#
# If you need a custom-built kernel, replace the download step with an
# action that copies your locally-built .deb into the rootfs and installs it.

actions:
  # ── Download the Sultan kernel .deb ──────────────────────────────────────
  - action: run
    description: Fetch Sultan kernel .deb for husky
    chroot: false
    command: |
      set -e
      SULTAN_TAG="${SULTAN_TAG:-latest}"
      ARCH="arm64"
      CODENAME="husky"
      TMPDIR="${ROOTDIR}/tmp/sultan-kernel"
      mkdir -p "${TMPDIR}"

      if [ "${SULTAN_TAG}" = "latest" ]; then
        echo "[kernel] Resolving latest Sultan kernel tag..."
        SULTAN_TAG=$(curl -fsSL \
          "https://api.github.com/repos/sultanxda/sultan-kernel-releases/releases/latest" \
          | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
        echo "[kernel] Latest tag: ${SULTAN_TAG}"
      fi

      # The release asset name follows the pattern:
      #   linux-image-<ver>-sultan-husky_<ver>_arm64.deb
      # Download the first .deb asset that matches the device codename.
      ASSETS=$(curl -fsSL \
        "https://api.github.com/repos/sultanxda/sultan-kernel-releases/releases/tags/${SULTAN_TAG}" \
        | python3 -c "
      import sys, json
      data = json.load(sys.stdin)
      for a in data.get('assets', []):
          if '${CODENAME}' in a['name'] and a['name'].endswith('.deb'):
              print(a['browser_download_url'])
      ")

      if [ -z "${ASSETS}" ]; then
        echo "[kernel] ERROR: No .deb asset found for tag ${SULTAN_TAG} / device ${CODENAME}" >&2
        exit 1
      fi

      DEB_URL=$(echo "${ASSETS}" | head -1)
      DEB_FILE="${TMPDIR}/$(basename "${DEB_URL}")"
      echo "[kernel] Downloading: ${DEB_URL}"
      curl -fL -o "${DEB_FILE}" "${DEB_URL}"
      echo "[kernel] Downloaded: ${DEB_FILE}"

      # Store path for next step
      echo "${DEB_FILE}" > "${ROOTDIR}/tmp/sultan-kernel.deb.path"

  # ── Install the Sultan kernel .deb into the rootfs ───────────────────────
  - action: run
    description: Install Sultan kernel into rootfs
    chroot: false
    command: |
      set -e
      DEB_FILE=$(cat "${ROOTDIR}/tmp/sultan-kernel.deb.path")
      echo "[kernel] Installing ${DEB_FILE} into rootfs..."

      # Copy .deb into rootfs so dpkg inside chroot can see it
      cp "${DEB_FILE}" "${ROOTDIR}/tmp/"
      DEB_BASENAME=$(basename "${DEB_FILE}")

      # Install with dpkg; suppress initramfs during install, regenerate after
      chroot "${ROOTDIR}" bash -c "
        export DEBIAN_FRONTEND=noninteractive
        export DO_NOT_UPDATE_INITRAMFS=1
        dpkg -i /tmp/${DEB_BASENAME}
        rm -f /tmp/${DEB_BASENAME}
      "
      echo "[kernel] dpkg install done"

  # ── Generate initramfs for the installed kernel ───────────────────────────
  - action: run
    description: Generate initramfs for Sultan kernel
    chroot: true
    command: |
      set -e
      KVER=$(linux-version list | sort -V | tail -1)
      echo "[kernel] Generating initramfs for ${KVER}..."
      update-initramfs -c -k "${KVER}"
      echo "[kernel] initramfs: /boot/initrd.img-${KVER}"

  # ── Verify expected artifacts ─────────────────────────────────────────────
  - action: run
    description: Verify kernel artifacts exist
    chroot: true
    command: |
      set -e
      KVER=$(linux-version list | sort -V | tail -1)
      for f in \
        "/boot/vmlinuz-${KVER}" \
        "/boot/initrd.img-${KVER}"; do
        if [ ! -f "${f}" ]; then
          echo "[kernel] ERROR: missing ${f}" >&2
          exit 1
        fi
        echo "[kernel] OK: ${f}"
      done
      DTB="/usr/lib/linux-image-${KVER}/google/husky.dtb"
      if [ -f "${DTB}" ]; then
        echo "[kernel] OK: ${DTB}"
      else
        echo "[kernel] WARNING: DTB not found at ${DTB} (will use kernel-only boot.img)"
      fi

  # ── Clean up temp files ───────────────────────────────────────────────────
  - action: run
    description: Remove temp kernel download artefacts
    chroot: false
    command: |
      rm -rf "${ROOTDIR}/tmp/sultan-kernel"
      rm -f  "${ROOTDIR}/tmp/sultan-kernel.deb.path"
